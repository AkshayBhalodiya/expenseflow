services:
  mongodb:
    image: mongo:7
    container_name: expense-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: expense_management

  backend:
    build: ./backend
    container_name: expense-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/expense_management
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: expense-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongodb_data:
  uploads_data:
